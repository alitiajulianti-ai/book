<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Peminjaman Buku</title>
    <link rel="stylesheet" href="PEMINJAMAN.css">
</head>
<body>

<header class="navbar">
    <h2>📘 Peminjaman Buku</h2>
    <nav>
        <a href="BERANDA.html">Beranda</a>
        <a href="DAFTAR BUKU .html">Daftar Buku</a>
        <a href="PEMINJAM.html" class="active">Peminjaman</a>
    </nav>
</header>

<main class="container">

    <form id="formPeminjaman" class="card">
        <h3>Form Peminjaman</h3>

        <label>Nama Peminjam</label>
        <input type="text" id="nama" required>

        <label>Pilih Buku</label>
        <select id="buku" required></select>

        <label>Tanggal Peminjaman</label>
        <input type="date" id="tglPinjam" required>

        <label>Tanggal Pengembalian</label>
        <input type="date" id="tglKembali" required>

        <button type="submit">Pinjam Buku</button>
    </form>

    <div class="card">  
    <h3>Data Peminjaman</h3>  

    <table>  
        <thead>  
            <tr>  
                <th>No</th>  
                <th>Nama</th>  
                <th>Buku</th>  
                <th>Tgl Pinjam</th>  
                <th>Tgl Kembali</th>  
            </tr>  
        </thead>  
        <tbody id="tabelPeminjaman"></tbody>  
    </table>  

    <!-- ✅ TAMBAH DI SINI -->
    <button class="btn-reset" onclick="resetData()">
        Reset Data Peminjaman
    </button>

</div>

</main>


<script src="PEMINJAMAN.js"></script>
</body>
</html>
